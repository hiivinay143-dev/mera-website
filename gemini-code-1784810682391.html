<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rickshaw Live Network</title>

    <!-- Leaflet Map CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        html, body, #map {
            height: 100%;
            width: 100%;
            overflow: hidden;
            background: #e5e3df;
        }

        /* Startup Selection Modal */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.88);
            display: flex; justify-content: center; align-items: center;
            z-index: 99999;
            backdrop-filter: blur(8px);
        }

        .modal-box {
            background: #ffffff;
            padding: 28px 24px;
            border-radius: 20px;
            text-align: center;
            width: 88%; max-width: 350px;
            box-shadow: 0 12px 30px rgba(0,0,0,0.35);
        }

        .modal-box h2 {
            font-size: 22px; color: #111; margin-bottom: 6px; font-weight: 800;
        }

        .modal-box p {
            font-size: 13px; color: #666; margin-bottom: 22px; line-height: 1.4;
        }

        .btn-group {
            display: flex; flex-direction: column; gap: 14px;
        }

        .role-btn {
            padding: 16px; border: none; border-radius: 12px;
            font-size: 16px; font-weight: 700; color: #ffffff;
            cursor: pointer; transition: all 0.2s ease;
            display: flex; align-items: center; justify-content: center; gap: 10px;
        }

        .role-btn:active { transform: scale(0.97); }
        .btn-rider { background: #e63946; box-shadow: 0 4px 12px rgba(230, 57, 70, 0.3); }
        .btn-sawari { background: #2a9d8f; box-shadow: 0 4px 12px rgba(42, 157, 143, 0.3); }

        /* Top Live Bar */
        .status-card {
            position: fixed; top: 14px; left: 50%;
            transform: translateX(-50%); z-index: 1000;
            background: #ffffff; padding: 10px 20px; border-radius: 30px;
            font-size: 13px; font-weight: 700;
            box-shadow: 0 4px 18px rgba(0,0,0,0.18);
            display: none; align-items: center; gap: 10px;
        }

        .badge { width: 12px; height: 12px; border-radius: 50%; }
        .badge-rider { background: #e63946; }
        .badge-sawari { background: #2a9d8f; }

        /* Destination Control Card */
        .dest-card {
            position: fixed; bottom: 20px; left: 50%;
            transform: translateX(-50%); z-index: 1000;
            background: #ffffff; padding: 12px 18px; border-radius: 14px;
            box-shadow: 0 6px 20px rgba(0,0,0,0.25);
            font-size: 13px; font-weight: 600; color: #222;
            display: none; align-items: center; gap: 12px;
            width: 90%; max-width: 360px; justify-content: space-between;
        }

        .btn-reset {
            background: #e63946; color: white; border: none;
            padding: 7px 14px; border-radius: 8px; cursor: pointer;
            font-size: 12px; font-weight: 700;
        }

        /* Marker Pin Styling */
        .custom-pin {
            width: 30px; height: 30px; border-radius: 50%;
            border: 2px solid #ffffff; display: flex;
            align-items: center; justify-content: center;
            box-shadow: 0 3px 10px rgba(0,0,0,0.35);
        }

        .pin-rider { background-color: #e63946; }
        .pin-sawari { background-color: #2a9d8f; }

        .direction-arrow {
            width: 0; height: 0;
            border-left: 6px solid transparent;
            border-right: 6px solid transparent;
            border-bottom: 14px solid #ffffff;
            transition: transform 0.1s linear;
        }

        .sawari-inner {
            width: 10px; height: 10px; background: #ffffff; border-radius: 50%;
        }
    </style>
</head>
<body>

    <!-- Startup Mode Picker -->
    <div class="modal-overlay" id="roleModal">
        <div class="modal-box">
            <h2>Select Your Mode</h2>
            <p>Aap kis rup me login karna chahte hain?</p>
            <div class="btn-group">
                <button class="role-btn btn-rider" onclick="startSystem('rider')">
                    🛺 Auto / E-Rickshaw (Rider)
                </button>
                <button class="role-btn btn-sawari" onclick="startSystem('sawari')">
                    🧍 Passenger (Sawari)
                </button>
            </div>
        </div>
    </div>

    <!-- Active Status Bar -->
    <div class="status-card" id="statusBar">
        <div id="statusDot" class="badge"></div>
        <span id="statusText">Connecting...</span>
    </div>

    <!-- Sawari Destination Guidance Panel -->
    <div class="dest-card" id="destCard">
        <span id="destStatus">📍 Map par tap karke destination set karein</span>
        <button class="btn-reset" onclick="resetDestination()">Reset Route</button>
    </div>

    <div id="map"></div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        let map = null;
        let ws = null;
        let myId = 'user_' + Math.floor(Math.random() * 1000000);
        let myRole = null;
        let selfMarker = null;

        let myLat = null;
        let myLng = null;
        let myHeading = 0;
        let myDestination = null;

        let destMarker = null;
        let destLine = null;

        let activeMarkers = {};
        let activeRoutes = {};
        let isMapCentered = false;
        let wakeLock = null;

        // Custom Dynamic Pin Generator
        function getIcon(role, heading = 0) {
            const isRider = role === 'rider';
            const bgClass = isRider ? 'pin-rider' : 'pin-sawari';
            
            const innerElement = isRider 
                ? `<div class="direction-arrow" style="transform: rotate(${heading}deg);"></div>` 
                : `<div class="sawari-inner"></div>`;

            return L.divIcon({
                className: '',
                html: `<div class="custom-pin ${bgClass}">${innerElement}</div>`,
                iconSize: [30, 30],
                iconAnchor: [15, 15]
            });
        }

        // Initialize App
        function startSystem(role) {
            myRole = role;
            document.getElementById('roleModal').style.display = 'none';

            const statusBar = document.getElementById('statusBar');
            const statusDot = document.getElementById('statusDot');
            const statusText = document.getElementById('statusText');

            statusBar.style.display = 'flex';
            if (role === 'rider') {
                statusDot.className = 'badge badge-rider';
                statusText.innerText = 'Rider Mode (Red Location)';
            } else {
                statusDot.className = 'badge badge-sawari';
                statusText.innerText = 'Sawari Mode (Green Location)';
                document.getElementById('destCard').style.display = 'flex';
            }

            // Init Map Engine
            map = L.map('map', { zoomControl: false }).setView([20.5937, 78.9629], 5);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 19 }).addTo(map);
            L.control.zoom({ position: 'bottomright' }).addTo(map);

            if (myRole === 'sawari') {
                map.on('click', setDestination);
            }

            // Request Wake Lock (Prevents Screen Off Tracking Freeze)
            requestWakeLock();

            // Connect Live Relay & Start GPS
            connectWebSocket();
            startLiveGPS();
        }

        // Lock Screen Background Fix
        async function requestWakeLock() {
            try {
                if ('wakeLock' in navigator) {
                    wakeLock = await navigator.wakeLock.request('screen');
                }
            } catch (err) {}
        }

        // Destination Setter for Sawari
        function setDestination(e) {
            if (!myLat || !myLng) return;

            myDestination = { lat: e.latlng.lat, lng: e.latlng.lng };

            if (destMarker) map.removeLayer(destMarker);
            if (destLine) map.removeLayer(destLine);

            destMarker = L.marker([myDestination.lat, myDestination.lng]).addTo(map)
                .bindPopup('<b>Manzil (Destination)</b>').openPopup();

            destLine = L.polyline([[myLat, myLng], [myDestination.lat, myDestination.lng]], {
                color: '#2a9d8f', weight: 4, dashArray: '6, 8'
            }).addTo(map);

            document.getElementById('destStatus').innerText = 'Destination Set Ho Gayi!';
            syncPosition();
        }

        function resetDestination() {
            myDestination = null;
            if (destMarker) map.removeLayer(destMarker);
            if (destLine) map.removeLayer(destLine);
            document.getElementById('destStatus').innerText = '📍 Map par tap karke destination set karein';
            syncPosition();
        }

        // Realtime High Precision GPS Tracker
        function startLiveGPS() {
            if ("geolocation" in navigator) {
                navigator.geolocation.watchPosition(
                    (pos) => {
                        myLat = pos.coords.latitude;
                        myLng = pos.coords.longitude;
                        myHeading = pos.coords.heading || 0;

                        if (!isMapCentered) {
                            map.setView([myLat, myLng], 16);
                            isMapCentered = true;
                        }

                        if (selfMarker) {
                            selfMarker.setLatLng([myLat, myLng]);
                            selfMarker.setIcon(getIcon(myRole, myHeading));
                        } else {
                            selfMarker = L.marker([myLat, myLng], {
                                icon: getIcon(myRole, myHeading)
                            }).addTo(map).bindPopup('<b>Aapki Live Location</b>');
                        }

                        if (myDestination && destLine) {
                            destLine.setLatLngs([[myLat, myLng], [myDestination.lat, myDestination.lng]]);
                        }

                        syncPosition();
                    },
                    (err) => {
                        console.warn("GPS Tracking Active...");
                    },
                    { enableHighAccuracy: true, maximumAge: 1000, timeout: 10000 }
                );
            }
        }

        // Continuous Relay Connectivity Engine
        function connectWebSocket() {
            ws = new WebSocket('wss://free.websocket.org');

            ws.onopen = () => {
                syncPosition();
            };

            ws.onmessage = (event) => {
                try {
                    const data = JSON.parse(event.data);
                    if (data && data.id && data.id !== myId) {
                        processIncomingUser(data);
                    }
                } catch (e) {}
            };

            ws.onclose = () => {
                setTimeout(connectWebSocket, 2000); // Auto-Reconnect
            };
        }

        function syncPosition() {
            if (ws && ws.readyState === WebSocket.OPEN && myLat && myLng) {
                const data = {
                    id: myId,
                    role: myRole,
                    lat: myLat,
                    lng: myLng,
                    heading: myHeading,
                    destination: myDestination
                };
                ws.send(JSON.stringify(data));
            }
        }

        // PRIVACY ENFORCEMENT & DISPLAY ENGINE
        function processIncomingUser(user) {
            // RULE: Sawari cannot see other Sawaris
            if (myRole === 'sawari' && user.role === 'sawari') {
                removeUser(user.id);
                return;
            }

            // Render / Update Position Marker
            if (activeMarkers[user.id]) {
                activeMarkers[user.id].setLatLng([user.lat, user.lng]);
                activeMarkers[user.id].setIcon(getIcon(user.role, user.heading || 0));
            } else {
                activeMarkers[user.id] = L.marker([user.lat, user.lng], {
                    icon: getIcon(user.role, user.heading || 0)
                }).addTo(map).bindPopup(`<b>${user.role.toUpperCase()}</b>`);
            }

            // Rider View: Show Sawari's Intended Route Direction
            if (myRole === 'rider' && user.role === 'sawari' && user.destination) {
                if (activeRoutes[user.id]) {
                    activeRoutes[user.id].setLatLngs([
                        [user.lat, user.lng],
                        [user.destination.lat, user.destination.lng]
                    ]);
                } else {
                    activeRoutes[user.id] = L.polyline([
                        [user.lat, user.lng],
                        [user.destination.lat, user.destination.lng]
                    ], { color: '#2a9d8f', weight: 4, dashArray: '6, 8' }).addTo(map);
                }
            }
        }

        function removeUser(id) {
            if (activeMarkers[id]) {
                map.removeLayer(activeMarkers[id]);
                delete activeMarkers[id];
            }
            if (activeRoutes[id]) {
                map.removeLayer(activeRoutes[id]);
                delete activeRoutes[id];
            }
        }

        // Heartbeat Keep-Alive Loop (Fixes 30-sec freeze & screen lock issues)
        setInterval(() => {
            syncPosition();
        }, 3000);
    </script>
</body>
</html>
